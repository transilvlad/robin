# Docker Compose for Haraka + Dovecot Performance Testing
# This stack tests Haraka as the SMTP ingress server delivering to Dovecot via LMTP.

services:
  postgres:
    image: postgres:latest
    command:
      - "postgres"
      - "-c"
      - "logging_collector=on"
      - "-c"
      - "log_directory=/var/log/postgresql"
      - "-c"
      - "log_filename=postgresql.log"
      - "-c"
      - "log_destination=stderr"
    environment:
      POSTGRES_DB: robin
      POSTGRES_USER: robin
      POSTGRES_PASSWORD: robin
      POSTGRES_MAX_CONNECTIONS: 300
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ../.shared/db-init:/docker-entrypoint-initdb.d:ro
      - ../../store/postgres:/var/lib/postgresql
      - ../../log/postgres:/var/log/postgresql
    networks:
      haraka-net:
        aliases:
          - postgres-backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U robin -d robin"]
      interval: 5s
      timeout: 3s
      retries: 10

  dovecot:
    image: dovecot/dovecot:latest
    container_name: dovecot
    user: "0:0"
    cap_add:
      - CHOWN
    volumes:
      - ./dovecot/etc:/etc/dovecot
      - ../../store/dovecot:/var/mail/vhosts
      - ../../log/dovecot:/var/log
    networks:
      haraka-net:
        aliases:
          - lmtp-backend
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "doveadm", "who"]
      interval: 10s
      timeout: 5s
      retries: 5

  haraka:
    build:
      context: ../../
      dockerfile: ./.perf/robin-dovecot/haraka/Dockerfile
    container_name: haraka
    networks:
      - haraka-net
    depends_on:
      dovecot:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "2525:25"
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "25"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

networks:
  haraka-net:
    driver: bridge

volumes: {}
